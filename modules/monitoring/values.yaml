# Micro-friendly profile: keep only Prometheus + Grafana with reduced footprint.
defaultRules:
  create: false

alertmanager:
  enabled: false

prometheusOperator:
  tls:
    enabled: false
  admissionWebhooks:
    enabled: false
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

kubeStateMetrics:
  enabled: false

nodeExporter:
  enabled: false

grafana:
  enabled: true
  adminPassword: admin123
  service:
    type: ClusterIP
    port: 80
  sidecar:
    dashboards:
      enabled: false
    datasources:
      enabled: false
  resources:
    requests:
      cpu: 25m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 256Mi

prometheus:
  enabled: true
  service:
    type: ClusterIP
    port: 9090
  prometheusSpec:
    replicas: 1
    retention: 6h
    scrapeInterval: 60s
    evaluationInterval: 60s
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 512Mi
