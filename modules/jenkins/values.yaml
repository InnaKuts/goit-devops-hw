controller:
  admin:
    username: admin
    password: admin123

  serviceType: LoadBalancer
  servicePort: 80
  service:
    port: 80
    targetPort: 8080

  # Drops config-reload-init (kiwigrid sidecar); avoids extra init failure modes on tiny nodes.
  # JCasC still applies on controller startup.
  sidecars:
    configAutoReload:
      enabled: false

  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "256Mi"

  # Plugin install in `init` needs real heap; 384Mi often OOMKills on t3.micro stacks.
  initContainerResources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "768Mi"

  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - configuration-as-code:latest
    - credentials-binding:latest

# Official chart uses top-level `persistence` (not controller.persistentVolume).
persistence:
  enabled: true
  storageClass: gp2
  size: 10Gi
