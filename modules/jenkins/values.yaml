controller:
  image:
    registry: docker.io
    repository: jenkins/jenkins
    tag: lts-jdk17
  admin:
    username: admin
    password: admin123

  serviceType: LoadBalancer
  servicePort: 80
  service:
    port: 80
    targetPort: 8080

  # Drops config-reload-init (kiwigrid sidecar); avoids extra init failure modes on tiny nodes.
  # JCasC still applies on controller startup.
  sidecars:
    configAutoReload:
      enabled: false

  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "256Mi"

  # Plugin install in `init` needs real heap; 384Mi often OOMKills on t3.micro stacks.
  initContainerResources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "768Mi"
  # Keep JVM heap bounded on tiny nodes.
  javaOpts: "-Xms128m -Xmx512m -XX:+UseSerialGC"
  initContainerEnv:
    - name: JAVA_OPTS
      value: "-Xms128m -Xmx512m -XX:+UseSerialGC"

  # Avoid resolving/upgrading to latest plugin graph on startup.
  installLatestPlugins: false
  installLatestSpecifiedPlugins: false

  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - credentials-binding

# Official chart uses top-level `persistence` (not controller.persistentVolume).
persistence:
  enabled: true
  storageClass: gp2
  size: 10Gi
